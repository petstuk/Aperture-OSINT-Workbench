<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aperture</title>
  <link rel="stylesheet" href="aperture.css">
  <style>
    body.aperture {
      width: 380px;
      max-height: 600px;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--bg-browser);
    }
    .popup-card {
      margin: 10px;
      background: var(--top-bar);
      border: 1px solid var(--border-3);
      border-radius: var(--radius-float);
      box-shadow: var(--shadow-float);
      overflow: hidden;
      animation: fadeUp 0.16s ease;
    }
    .popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--divider);
    }
    .popup-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .detect-field {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 12px;
      background: var(--inset);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
    }
    .detect-field input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-hi);
      font-size: 12.5px;
      font-family: var(--font-mono);
    }
    .detect-field input::placeholder {
      color: var(--text-faint);
      font-family: var(--font-ui);
    }
    .detected {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
      padding: 12px;
      display: none;
    }
    .detected.show { display: block; }
    .detected-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .detected-value {
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--text-2);
      word-break: break-all;
    }
    .detected-enrich {
      font-size: 10.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .quick-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .quick-tool {
      height: 28px;
      padding: 0 10px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      transition: 0.12s;
    }
    .quick-tool:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .row-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: none;
      border: none;
      border-radius: var(--radius);
      color: var(--text-2);
      font-size: 12.5px;
      text-align: left;
      transition: 0.12s;
    }
    .row-btn:hover { background: var(--surface-2); }
    .row-meta {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-dim);
    }
    .recent-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--divider-faint);
    }
    .recent-row:last-child { border-bottom: none; }
    .recent-value {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .popup-foot {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .settings-panel {
      display: none;
      padding: 0 14px 14px;
    }
    .settings-panel.open { display: block; }
    .svc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 12px;
      color: var(--text-2);
      border-bottom: 1px solid var(--divider-faint);
    }
    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--border-2);
      border: none;
      position: relative;
      transition: 0.15s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: 0.15s;
    }
    .toggle.on::after { left: 19px; }
  </style>
</head>
<body class="aperture">
  <div class="popup-card">
    <div class="popup-head">
      <div class="popup-brand">
        <div class="ap-logo"><div class="ap-logo-dot"></div></div>
        <div class="ap-wordmark">
          <span class="ap-wordmark-title">APERTURE</span>
          <span class="ap-wordmark-sub">osint workbench</span>
        </div>
      </div>
      <button type="button" class="ap-btn ap-btn-secondary ap-btn-sm" id="btn-palette" title="Command palette">⌘K</button>
    </div>

    <div class="popup-body">
      <div class="detect-field">
        <span style="color:var(--text-dim)">⌕</span>
        <input id="detect-input" placeholder="Paste or select an indicator…" spellcheck="false" />
      </div>

      <div class="detected" id="detected-block">
        <div class="detected-top">
          <div class="detected-value" id="detected-value"></div>
          <span class="ap-pill" id="detected-type"></span>
        </div>
        <div class="detected-enrich" id="detected-enrich"></div>
        <div class="quick-tools" id="quick-tools"></div>
      </div>

      <div>
        <div class="section-label">Run a playbook</div>
        <div id="playbook-list"></div>
      </div>

      <div>
        <div class="section-label">Recent</div>
        <div id="recent-list"></div>
      </div>
    </div>

    <div class="settings-panel" id="settings-panel">
      <div class="section-label">Page highlights</div>
      <div class="svc-row">
        <span>On-page IoC detect</span>
        <button type="button" class="toggle" id="overlay-toggle" aria-label="Toggle overlays"></button>
      </div>
      <div class="section-label" style="margin-top:12px">Services</div>
      <div id="services-list"></div>
    </div>

    <div class="popup-foot">
      <button type="button" class="ap-btn ap-btn-primary" id="btn-workbench" style="width:100%">Open full workbench ↗</button>
      <button type="button" class="ap-btn ap-btn-secondary ap-btn-sm" id="btn-settings" style="width:100%">Settings</button>
    </div>
  </div>

  <script src="ioc-utils.js"></script>
  <script src="palette.js"></script>
  <script src="popup.js"></script>
</body>
</html>
